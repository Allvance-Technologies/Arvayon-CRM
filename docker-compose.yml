version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ai-crm-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_crm}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ai-crm-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: ai-crm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-crm-network

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai-crm-backend
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - AI_SERVICE_URL=http://ai-service:8001
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - ai-crm-network
    command: php artisan serve --host=0.0.0.0 --port=8000

  # Queue Worker
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai-crm-queue-worker
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - AI_SERVICE_URL=http://ai-service:8001
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
      - backend
    networks:
      - ai-crm-network
    command: php artisan queue:work --tries=3

  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.dev
    container_name: ai-crm-ai-service
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app
    networks:
      - ai-crm-network
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ai-crm-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ai-crm-network
    command: npm run dev -- --host

volumes:
  mysql_data:
  redis_data:

networks:
  ai-crm-network:
    driver: bridge
