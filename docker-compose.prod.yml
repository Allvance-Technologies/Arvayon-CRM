version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-crm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_crm}
      MYSQL_USER: ${MYSQL_USER:-ai_crm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ai-crm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-crm-redis
    volumes:
      - redis_data:/data
    networks:
      - ai-crm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-crm-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-ai_crm}
      DB_USERNAME: ${MYSQL_USER:-ai_crm}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai-service:8001
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-localhost}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-crm-network
    restart: unless-stopped

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-crm-queue-worker
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-ai_crm}
      DB_USERNAME: ${MYSQL_USER:-ai_crm}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      backend:
        condition: service_started
    networks:
      - ai-crm-network
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-crm-ai-service
    ports:
      - "8001:8001"
    environment:
      API_KEY: ${AI_SERVICE_KEY}
      CORS_ORIGINS: ${AI_CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      LOG_LEVEL: ${AI_LOG_LEVEL:-INFO}
    networks:
      - ai-crm-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    container_name: ai-crm-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-crm-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  ai-crm-network:
    driver: bridge

